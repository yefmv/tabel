<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>⚡ Crispy Табель v6.0</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>
<body>

<div class="app-container">
    <header class="app-header">
        <h1>🍕 CRISPY PIZZA</h1>
        <p>Учет рабочего времени & Табель</p>
    </header>
    
    <main class="card card-accent">
        <h2 class="card-title">➕ Внести новую смену</h2>
        
        <div class="input-group">
            <label for="shiftDate">Дата смены</label>
            <input type="date" id="shiftDate">
        </div>

        <div class="input-group">
            <label for="empSelect">Сотрудник</label>
            <select id="empSelect">
                <option value="">-- Нажмите для выбора --</option>
            </select>
        </div>

        <div class="time-row">
            <div class="input-group">
                <label for="arrTime">⏰ Приход</label>
                <input type="time" id="arrTime">
            </div>
            <div class="input-group">
                <label for="depTime">🌙 Уход</label>
                <input type="time" id="depTime">
            </div>
        </div>

        <button class="btn btn-gradient" onclick="addRecord()">Записать смену ✨</button>
    </main>

    <section class="card">
        <h2 class="card-title">📋 Смены в этом месяце</h2>
        <div class="preview-area" id="previewArea">Записей пока нет...</div>
        <button class="btn btn-success" onclick="exportToExcel()">📊 Скачать XLSX (Шахматка)</button>
    </section>

    <section class="card card-dark">
        <h2 class="card-title">⚙️ Управление командой</h2>
        
        <div class="input-group">
            <label for="newEmpName">Имя и Фамилия:</label>
            <input type="text" id="newEmpName" placeholder="Например: Иван Иванов">
        </div>
        
        <label>Выбор отдела:</label>
        <div class="dept-selector">
            <label class="dept-btn kitchen">
                <input type="radio" name="newEmpDept" value="кухня" checked>
                <span>🔥 Кухня</span>
            </label>
            <label class="dept-btn bar">
                <input type="radio" name="newEmpDept" value="бар">
                <span>🍹 Бар</span>
            </label>
        </div>
        
        <button class="btn btn-secondary" onclick="addEmployee()">Добавить в базу 💾</button>

        <h3 class="sub-title">Текущий состав:</h3>
        <div class="emp-list" id="empList"></div>
    </section>
</div>

<script src="script.js"></script>
</body>
</html>
