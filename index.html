<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Учет Времени — Crispy Pizza</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/xlsx-js-style@1.2.0/dist/xlsx.bundle.js"></script>
</head>
<body>
    <div class="container">
        <h1>Табель учета времени — CRISPY PIZZA</h1>
        
        <div class="card">
            <h2 id="formTitle">Добавить смену</h2>
            <div class="form-grid">
                <div class="form-group">
                    <label>Дата смены</label>
                    <input type="date" id="shiftDate">
                </div>
                <div class="form-group">
                    <label>Сотрудник</label>
                    <select id="empSelect">
                        <option value="">-- Нажмите для выбора --</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Время прихода</label>
                    <input type="time" id="arrTime">
                </div>
                <div class="form-group">
                    <label>Время ухода</label>
                    <input type="time" id="depTime">
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-primary" id="submitBtn" onclick="addRecord()">Сохранить смену</button>
                <button class="btn-secondary" id="cancelEditBtn" onclick="cancelEdit()" style="display: none; width: 30%;">Отмена</button>
            </div>
        </div>

        <div class="main-layout">
            <div class="card">
                <div class="card-header">
                    <h2>Текущие записи смен</h2>
                    <button class="btn-success" onclick="exportToExcel()">Выгрузить в Excel</button>
                </div>
                <div id="previewArea" class="preview-area"></div>
            </div>

            <div class="card">
                <h2>Сотрудники в базе</h2>
                <div class="add-emp-form">
                    <input type="text" id="newEmpName" placeholder="Имя нового сотрудника">
                    <div class="radio-group">
                        <label><input type="radio" name="newEmpDept" value="кухня" checked> Кухня</label>
                        <label><input type="radio" name="newEmpDept" value="бар"> Бар</label>
                    </div>
                    <button class="btn-secondary" onclick="addEmployee()">Добавить</button>
                </div>
                <div id="empList" class="emp-list"></div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
